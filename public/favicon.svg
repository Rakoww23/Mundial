<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3a24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trophyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Forma del escudo -->
  <path d="M 100 20 L 160 60 L 160 140 Q 100 200 100 200 Q 100 200 40 140 L 40 60 Z" fill="url(#shieldGradient)" stroke="#8b7355" stroke-width="2"/>

  <!-- Franja superior (mapas) -->
  <rect x="50" y="40" width="100" height="30" fill="#d4af37" rx="2"/>

  <!-- Estrella en la franja superior -->
  <g transform="translate(100, 55)">
    <polygon points="0,-8 2.4,-2.4 8,-0.8 3.2,3.2 5.6,9.6 0,6 -5.6,9.6 -3.2,3.2 -8,-0.8 -2.4,-2.4" fill="#1b5e3f"/>
  </g>

  <!-- Trofeo principal -->
  <g transform="translate(100, 105)">
    <!-- Base del trofeo -->
    <ellipse cx="0" cy="20" rx="18" ry="6" fill="#c9a961"/>

    <!-- Pedestal -->
    <rect x="-8" y="15" width="16" height="8" fill="#8b7355"/>

    <!-- Cuerpo del trofeo -->
    <path d="M -20 10 L -22 -5 Q -22 -15 -12 -15 L 12 -15 Q 22 -15 22 -5 L 20 10 Z" fill="url(#trophyGradient)" stroke="#c9a961" stroke-width="1.5"/>

    <!-- Asas del trofeo -->
    <path d="M -12 -5 Q -28 -10 -28 5" fill="none" stroke="url(#trophyGradient)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 12 -5 Q 28 -10 28 5" fill="none" stroke="url(#trophyGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Copa del trofeo -->
    <ellipse cx="0" cy="-15" rx="15" ry="5" fill="#ffed4e"/>
  </g>

  <!-- Laureles inferiores izquierdo -->
  <g transform="translate(60, 155)">
    <path d="M 0 0 Q -8 -10 -8 -20 Q -8 -10 0 0" fill="#d4af37" opacity="0.8"/>
    <path d="M 0 0 Q -5 -8 -5 -15 Q -3 -10 0 0" fill="#d4af37" opacity="0.9"/>
    <ellipse cx="-6" cy="-8" rx="2" ry="3" fill="#c9a961"/>
    <ellipse cx="-7" cy="-15" rx="1.5" ry="2.5" fill="#c9a961"/>
  </g>

  <!-- Laureles inferiores derecho -->
  <g transform="translate(140, 155)">
    <path d="M 0 0 Q 8 -10 8 -20 Q 8 -10 0 0" fill="#d4af37" opacity="0.8"/>
    <path d="M 0 0 Q 5 -8 5 -15 Q 3 -10 0 0" fill="#d4af37" opacity="0.9"/>
    <ellipse cx="6" cy="-8" rx="2" ry="3" fill="#c9a961"/>
    <ellipse cx="7" cy="-15" rx="1.5" ry="2.5" fill="#c9a961"/>
  </g>
</svg>